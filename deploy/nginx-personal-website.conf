server {
    listen 80;
    listen [::]:80;
    server_name tangjujia.me www.tangjujia.me;

    root /var/www/tangjujia.me/html;
    index index.html;

    access_log /var/log/nginx/tangjujia.me.access.log;
    error_log /var/log/nginx/tangjujia.me.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
